<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎰 ゲキッチャ - 激アツアンケート</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: "Hiragino Maru Gothic ProN", "ヒラギノ丸ゴ ProN", "Rounded Mplus 1c",
                 -apple-system, BlinkMacSystemFont, sans-serif;
    background: #000;
  }

  .app {
    position: relative;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
  }

  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .screen.active {
    opacity: 1;
    pointer-events: auto;
  }

  /* ===== オープニング ===== */
  #opening {
    background:
      radial-gradient(circle at 50% 42%,
        rgba(255, 255, 210, 0.9) 0%,
        rgba(255, 220, 70, 0.55) 18%,
        transparent 38%),
      linear-gradient(150deg,
        transparent 0 58%,
        rgba(255,255,255,0.18) 58% 74%,
        transparent 74%),
      radial-gradient(ellipse 80% 60% at 50% 30%,
        #fff5d0 0%,
        #ffd93d 15%,
        #ffa94d 35%,
        #ff6b6b 65%,
        #ff4757 90%,
        #c92a2a 100%);
    display: grid;
    grid-template-rows:
      minmax(34px, 0.34fr)
      auto
      auto
      auto
      auto
      auto
      minmax(8px, 0.32fr)
      auto;
    gap: clamp(7px, 1.2vh, 13px);
    justify-content: center;
    align-items: center;
    text-align: center;
    color: #fff;
    overflow: hidden;
    padding:
      clamp(14px, 2vh, 24px)
      16px
      calc(22px + env(safe-area-inset-bottom));
  }

  .bg-decor {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .bg-item {
    position: absolute;
    font-size: 28px;
    animation: floatRotate 5s ease-in-out infinite;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
  }

  @keyframes floatRotate {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-15px) rotate(20deg); }
  }

  .rays {
    position: absolute;
    top: 25%;
    left: 50%;
    width: 800px;
    height: 800px;
    transform: translate(-50%, -50%);
    background:
      conic-gradient(
        from 0deg,
        rgba(255,255,255,0.15) 0deg,
        transparent 20deg,
        rgba(255,255,255,0.15) 40deg,
        transparent 60deg,
        rgba(255,255,255,0.15) 80deg,
        transparent 100deg,
        rgba(255,255,255,0.15) 120deg,
        transparent 140deg,
        rgba(255,255,255,0.15) 160deg,
        transparent 180deg,
        rgba(255,255,255,0.15) 200deg,
        transparent 220deg,
        rgba(255,255,255,0.15) 240deg,
        transparent 260deg,
        rgba(255,255,255,0.15) 280deg,
        transparent 300deg,
        rgba(255,255,255,0.15) 320deg,
        transparent 340deg
      );
    animation: raySpin 30s linear infinite;
    pointer-events: none;
  }

  @keyframes raySpin {
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }

  .slot-machine {
    width: min(34vw, 142px);
    max-height: clamp(82px, 17vh, 132px);
    height: auto;
    object-fit: contain;
    justify-self: center;
    margin-top: clamp(10px, 2vh, 18px);
    filter:
      drop-shadow(0 10px 20px rgba(0,0,0,0.35))
      drop-shadow(0 0 30px rgba(255,255,100,0.6));
    animation: slotBounce 2s ease-in-out infinite;
    z-index: 2;
  }

  @keyframes slotBounce {
    0%, 100% { transform: translateY(0) rotate(-3deg) scale(1); }
    50% { transform: translateY(-10px) rotate(3deg) scale(1.03); }
  }

  .title-3d {
    font-size: clamp(44px, 14vw, 64px);
    font-weight: 900;
    color: #fff;
    letter-spacing: -2px;
    margin-top: -4px;
    position: relative;
    z-index: 3;
    white-space: nowrap;
    text-shadow:
      -3px -3px 0 #ff5722,
      3px -3px 0 #ff5722,
      -3px 3px 0 #ff5722,
      3px 3px 0 #ff5722,
      -4px -4px 0 #ff5722,
      4px -4px 0 #ff5722,
      -4px 4px 0 #ff5722,
      4px 4px 0 #ff5722,
      0 6px 0 #c62828,
      0 8px 0 #a02020,
      0 10px 0 #801818,
      0 14px 20px rgba(0,0,0,0.4);
    animation: titleFloat 3s ease-in-out infinite;
  }

  @keyframes titleFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  .logo-img {
    width: min(88%, 400px);
    max-height: clamp(142px, 25vh, 210px);
    height: auto;
    object-fit: contain;
    margin-top: -8px;
    filter: drop-shadow(0 8px 16px rgba(0,0,0,0.3));
    animation: titleFloat 3s ease-in-out infinite;
    z-index: 3;
    position: relative;
  }

  .subtitle-line {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
    font-size: 16px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    z-index: 3;
    white-space: nowrap;
  }

  .subtitle-deco {
    display: inline-block;
    width: 40px;
    height: 2px;
    background: #fff;
    box-shadow: 0 0 6px rgba(255,255,255,0.8);
  }

  .tagline {
    font-size: clamp(13px, 3.8vw, 16px);
    font-weight: 700;
    color: #fff;
    margin-top: 0;
    text-shadow: 0 2px 4px rgba(0,0,0,0.25);
    z-index: 3;
    white-space: nowrap;
  }

  .gift-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.95);
    color: #ff6b35;
    padding: clamp(8px, 1.5vh, 11px) clamp(18px, 6vw, 24px);
    border-radius: 999px;
    font-size: clamp(12px, 3.6vw, 15px);
    font-weight: 800;
    margin-top: 0;
    box-shadow:
      0 10px 22px rgba(160,40,20,0.22),
      inset 0 -4px 10px rgba(255,140,66,0.18),
      inset 0 2px 5px rgba(255,255,255,0.9);
    z-index: 3;
    white-space: nowrap;
  }

  .gift-badge .emoji {
    font-size: 20px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
  }

  .start-btn {
    background: linear-gradient(180deg, #ffffff 0%, #fff5ec 100%);
    color: #ff5722;
    padding: clamp(15px, 2.4vh, 20px) clamp(52px, 15vw, 70px);
    border-radius: 999px;
    font-size: clamp(22px, 7vw, 30px);
    font-weight: 900;
    border: none;
    margin-top: 0;
    cursor: pointer;
    box-shadow:
      0 8px 0 #ffc77d,
      0 12px 24px rgba(0,0,0,0.25),
      inset 0 -4px 8px rgba(255,200,120,0.3);
    animation: startPulse 1.8s ease-in-out infinite;
    letter-spacing: 2px;
    z-index: 3;
    position: relative;
    white-space: nowrap;
  }

  @keyframes startPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }

  .start-btn:active {
    transform: translateY(6px);
    box-shadow:
      0 4px 0 #ffc77d,
      0 6px 12px rgba(0,0,0,0.2);
  }

  .coupon-ticket {
    display: flex;
    align-items: center;
    gap: 10px;
    width: min(94%, 410px);
    justify-content: center;
    background:
      linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,245,205,0.98) 100%);
    padding: clamp(8px, 1.5vh, 11px) clamp(16px, 5vw, 20px) clamp(8px, 1.5vh, 11px) clamp(10px, 4vw, 12px);
    border-radius: 16px;
    font-size: clamp(12px, 3.5vw, 15px);
    font-weight: 800;
    color: #a84a00;
    margin-top: 0;
    margin-bottom: 0;
    box-shadow:
      0 10px 24px rgba(120,40,0,0.24),
      inset 0 -3px 8px rgba(200,140,0,0.14),
      inset 0 2px 5px rgba(255,255,255,0.95);
    border: 2px solid rgba(255,255,255,0.82);
    z-index: 3;
    white-space: nowrap;
  }

  .coupon-bolt {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    background: linear-gradient(135deg, #ff6b6b, #ff4757);
    color: #fff;
    border-radius: 8px;
    font-size: 18px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }

  .coupon-ticket b {
    font-size: 17px;
    color: #e63946;
  }

  /* ===== アンケート画面 ===== */
  .quiz {
    background:
      radial-gradient(ellipse 100% 80% at 50% 0%,
        #fff5ec 0%,
        #ffe8d0 40%,
        #ffd4a8 100%);
    color: #2a2a2a;
    overflow: hidden;
    padding:
      14px
      clamp(14px, 5vw, 22px)
      calc(74px + env(safe-area-inset-bottom));
    /* Grid配置: top / gauge / answer stage / skip */
    display: grid;
    grid-template-rows: auto auto minmax(0, 1fr) auto;
    gap: clamp(6px, 1vh, 10px);
  }

  .quiz-sparkles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .sparkle-bg {
    position: absolute;
    font-size: 16px;
    animation: twinkle 2.5s ease-in-out infinite;
    opacity: 0;
    filter: drop-shadow(0 0 6px rgba(255, 200, 100, 0.8));
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5) rotate(0deg); }
    50% { opacity: 1; transform: scale(1.2) rotate(180deg); }
  }

  .quiz > :not(.quiz-sparkles) {
    position: relative;
    z-index: 1;
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    font-size: 13px;
    color: #a67040;
  }

  .progress-text {
    font-weight: 900;
    color: #ff5722;
    font-size: 15px;
  }

  .timer {
    font-weight: 800;
    font-variant-numeric: tabular-nums;
  }

  .gauge-wrap {
    background: linear-gradient(180deg, #fff 0%, #fff8f0 100%);
    border-radius: 18px;
    padding: 12px 14px;
    margin-bottom: 0;
    box-shadow:
      0 4px 0 rgba(255, 170, 110, 0.3),
      0 8px 20px rgba(255, 110, 50, 0.2),
      inset 0 -3px 6px rgba(255,200,150,0.2),
      inset 0 2px 4px rgba(255, 255, 255, 1);
    border: 2px solid #fff;
    position: relative;
  }

  .gauge-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .gauge-label {
    font-size: 13px;
    font-weight: 900;
    color: #ff5722;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .gauge-heart {
    display: inline-block;
    font-size: 20px;
    animation: heartbeat 1.2s infinite;
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.25); }
  }

  .gauge-percent {
    font-size: 16px;
    font-weight: 900;
    color: #ff5722;
    font-variant-numeric: tabular-nums;
  }

  .gauge-track {
    height: 22px;
    background: linear-gradient(90deg, #fff0d8, #ffe0b8);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.1);
  }

  .gauge-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg,
      #ffd93d 0%,
      #ff8c42 40%,
      #ff5722 80%,
      #e63946 100%);
    border-radius: 12px;
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    box-shadow: 0 0 12px rgba(255, 87, 34, 0.6);
  }

  .gauge-fill::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(255,255,255,0.6) 50%,
      transparent 100%);
    animation: shine 2s infinite;
  }

  @keyframes shine {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  .gauge-msg {
    text-align: center;
    font-size: 12px;
    color: #a67040;
    margin-top: 6px;
    font-weight: 700;
  }

  .question {
    font-size: clamp(22px, 6.5vw, 28px);
    font-weight: 900;
    margin: 0;
    padding: 4px 0 2px;
    line-height: 1.35;
    text-align: center;
    color: #3a1a0a;
    text-shadow: 0 2px 4px rgba(255,255,255,0.8);
  }

  .answer-stage {
    width: 100%;
    max-width: 460px;
    min-height: 0;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: clamp(18px, 4.2vh, 46px);
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: clamp(9px, 1.4vh, 12px);
    justify-content: center;
    align-items: stretch;
    min-height: 0;
    overflow: visible;
    width: 100%;
    max-width: 440px;
    margin: 0 auto;
  }

  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    width: 100%;
    max-width: 380px;
    margin: 0 auto;
  }

  .emoji-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .emoji-btn {
    aspect-ratio: 1;
    width: 100%;
    background:
      radial-gradient(circle at 50% 35%, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0.88) 44%, rgba(255,244,231,0.98) 100%),
      linear-gradient(180deg, #ffffff, #fff1e4);
    border: 3px solid rgba(255,255,255,0.96);
    border-radius: 22px;
    font-size: clamp(32px, 10vw, 42px);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 8px 0 rgba(255, 190, 130, 0.55),
      0 14px 24px rgba(180, 70, 30, 0.14),
      inset 0 -8px 16px rgba(255, 180, 120, 0.18),
      inset 0 4px 10px rgba(255,255,255,0.95);
    position: relative;
    isolation: isolate;
  }

  .emoji-btn::after,
  .option-btn::after,
  .tag-btn::after {
    content: "";
    position: absolute;
    inset: 5px 7px auto 7px;
    height: 34%;
    border-radius: inherit;
    background: linear-gradient(180deg, rgba(255,255,255,0.82), rgba(255,255,255,0));
    pointer-events: none;
    z-index: 1;
  }

  .emoji-btn::before {
    content: "";
    position: absolute;
    inset: 15%;
    border-radius: 50%;
    background: radial-gradient(circle,
      var(--emoji-bg, rgba(255, 200, 100, 0.4)) 0%,
      transparent 72%);
    z-index: 0;
    pointer-events: none;
  }

  .emoji-col:nth-child(1) .emoji-btn { --emoji-bg: rgba(255, 130, 160, 0.55); }
  .emoji-col:nth-child(2) .emoji-btn { --emoji-bg: rgba(255, 215, 100, 0.55); }
  .emoji-col:nth-child(3) .emoji-btn { --emoji-bg: rgba(160, 220, 140, 0.55); }
  .emoji-col:nth-child(4) .emoji-btn { --emoji-bg: rgba(200, 170, 230, 0.55); }

  .emoji-btn:active {
    transform: scale(0.95) translateY(5px);
    box-shadow:
      0 3px 0 rgba(255, 190, 130, 0.55),
      0 6px 12px rgba(180, 70, 30, 0.12),
      inset 0 -4px 10px rgba(255, 180, 120, 0.18);
  }

  .emoji-label {
    text-align: center;
    font-size: clamp(11px, 3.2vw, 13px);
    color: #a67040;
    font-weight: 800;
    text-shadow: 0 1px 0 rgba(255,255,255,0.75);
  }

  .option-btn {
    background:
      radial-gradient(circle at 18% 0%, rgba(255,255,255,0.98), transparent 42%),
      linear-gradient(180deg, #ffffff 0%, #fff8f1 58%, #ffe8d4 100%);
    border: 3px solid rgba(255,255,255,0.96);
    border-radius: 18px;
    padding: clamp(12px, 2vh, 16px) 20px;
    font-size: clamp(15px, 4.6vw, 18px);
    font-weight: 900;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    color: #3a1a0a;
    width: 100%;
    box-shadow:
      0 7px 0 rgba(255, 188, 125, 0.65),
      0 12px 22px rgba(170, 70, 30, 0.13),
      inset 0 -8px 14px rgba(255, 180, 120, 0.16),
      inset 0 4px 10px rgba(255,255,255,0.95);
    position: relative;
    overflow: hidden;
  }

  .option-btn:active {
    transform: scale(0.985) translateY(5px);
    background:
      radial-gradient(circle at 18% 0%, rgba(255,255,255,0.35), transparent 42%),
      linear-gradient(135deg, #ff9a3d, #ff5b2e);
    color: #fff;
    text-shadow: 0 2px 3px rgba(120, 30, 0, 0.22);
    box-shadow:
      0 3px 0 #c73a10,
      0 6px 12px rgba(255, 87, 34, 0.25),
      inset 0 3px 8px rgba(255,255,255,0.28);
  }

  .slider-wrap {
    padding: 10px 10px;
    width: 100%;
  }

  .slider-value {
    text-align: center;
    font-size: clamp(48px, 16vw, 64px);
    font-weight: 900;
    color: #ff5722;
    margin-bottom: 14px;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    text-shadow:
      0 2px 0 #ffb088,
      0 4px 8px rgba(255,100,50,0.3);
  }

  .slider {
    width: 100%;
    height: 40px;
    appearance: none;
    background: transparent;
  }

  .slider::-webkit-slider-runnable-track {
    height: 18px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.45), transparent),
      linear-gradient(90deg, #ffd93d, #ff8c42, #ff5722);
    border-radius: 999px;
    box-shadow:
      inset 0 2px 5px rgba(120, 60, 0, 0.16),
      0 5px 12px rgba(255, 110, 50, 0.18);
  }

  .slider::-webkit-slider-thumb {
    appearance: none;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 30%, #fff 0%, #fff7ee 42%, #ffd0a8 100%);
    border: 5px solid #ff5722;
    margin-top: -14px;
    cursor: pointer;
    box-shadow:
      0 7px 14px rgba(160, 60, 20, 0.26),
      inset 0 3px 7px rgba(255,255,255,0.9);
  }

  .slider-labels {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #a67040;
    font-weight: 700;
    margin-top: 8px;
  }

  .slider-submit,
  .tag-submit {
    margin-top: clamp(10px, 1.7vh, 14px);
    width: 100%;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.28), transparent 38%),
      linear-gradient(180deg, #ff9a3d, #ff5722);
    color: #fff;
    border: 2px solid rgba(255,255,255,0.7);
    padding: clamp(12px, 2vh, 16px);
    border-radius: 999px;
    font-size: clamp(16px, 5vw, 19px);
    font-weight: 900;
    cursor: pointer;
    box-shadow:
      0 7px 0 #c73a10,
      0 12px 22px rgba(255, 87, 34, 0.32),
      inset 0 4px 10px rgba(255,255,255,0.25);
    text-shadow: 0 2px 3px rgba(110, 28, 0, 0.22);
  }

  .slider-submit:active,
  .tag-submit:active {
    transform: translateY(5px);
    box-shadow:
      0 2px 0 #c73a10,
      0 4px 10px rgba(255, 87, 34, 0.3);
  }

  .tag-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: clamp(6px, 1vh, 8px);
    width: 100%;
  }

  .tag-btn {
    background:
      radial-gradient(circle at 18% 0%, rgba(255,255,255,0.98), transparent 42%),
      linear-gradient(180deg, #ffffff 0%, #fff8f1 58%, #ffe8d4 100%);
    border: 3px solid rgba(255,255,255,0.96);
    border-radius: 16px;
    padding: clamp(8px, 1.35vh, 12px) 8px;
    font-size: clamp(14px, 4vw, 16px);
    font-weight: 900;
    cursor: pointer;
    transition: all 0.15s;
    color: #3a1a0a;
    box-shadow:
      0 6px 0 rgba(255, 188, 125, 0.65),
      0 10px 18px rgba(170, 70, 30, 0.13),
      inset 0 -7px 12px rgba(255, 180, 120, 0.16),
      inset 0 4px 10px rgba(255,255,255,0.95);
    position: relative;
    overflow: hidden;
  }

  .tag-grid + .tag-submit {
    margin-top: clamp(8px, 1.2vh, 10px);
    padding: clamp(11px, 1.6vh, 14px);
    box-shadow:
      0 5px 0 #c73a10,
      0 9px 16px rgba(255, 87, 34, 0.28),
      inset 0 4px 10px rgba(255,255,255,0.25);
  }

  .tag-btn.selected {
    background:
      radial-gradient(circle at 18% 0%, rgba(255,255,255,0.35), transparent 42%),
      linear-gradient(135deg, #ff9a3d, #ff5b2e);
    color: #fff;
    transform: scale(0.97) translateY(4px);

<script>
  const LIFF_ID = new URLSearchParams(location.search).get('liffId') || '';
  const liffState = {
    ready: false,
    available: false,
    inClient: false,
    context: null,
    profile: null,
    error: null
  };

  async function initLiff() {
    if (!window.liff) {
      liffState.error = 'LIFF SDK is not loaded';
      console.info('[LIFF] SDK未読込のためデモモードで起動します');
      return;
    }

    if (!LIFF_ID) {
      liffState.available = true;
      liffState.inClient = liff.isInClient();
      liffState.context = safelyGetLiffContext();
      console.info('[LIFF] liffId未指定のためデモモードで起動します', liffState.context);
      return;
    }

    try {
      await liff.init({ liffId: LIFF_ID });
      liffState.ready = true;
      liffState.available = true;
      liffState.inClient = liff.isInClient();
      liffState.context = safelyGetLiffContext();

      if (liff.isLoggedIn()) {
        liffState.profile = await liff.getProfile();
      }

      console.info('[LIFF] 初期化完了', {
        userId: getLineUserId(),
        inClient: liffState.inClient,
        context: liffState.context
      });
    } catch (error) {
      liffState.error = error;
      console.warn('[LIFF] 初期化に失敗しました。デモモードで続行します', error);
    }
  }

  function safelyGetLiffContext() {
    try {
      return window.liff ? liff.getContext() : null;
    } catch (error) {
      return null;
    }
  }

  function getLineUserId() {
    return liffState.context?.userId || liffState.profile?.userId || null;
  }

  function createAnswerPayload(ticketNumber) {
    return {
      ticketNumber,
      lineUserId: getLineUserId(),
      liff: {
        ready: liffState.ready,
        inClient: liffState.inClient,
        context: liffState.context,
        profile: liffState.profile
          ? {
              userId: liffState.profile.userId,
              displayName: liffState.profile.displayName,
              pictureUrl: liffState.profile.pictureUrl
            }
          : null,
        error: liffState.error ? String(liffState.error.message || liffState.error) : null
      },
      elapsedSeconds: Math.floor((Date.now() - startTime) / 1000),
      submittedAt: new Date().toISOString(),
      answers
    };
  }

  function spawnBgDecor() {
    const container = document.getElementById('bgDecor');
    const items = ['🪙', '✨', '⭐', '🎊', '💛', '🟡', '🎉'];
    for (let i = 0; i < 18; i++) {
      const el = document.createElement('div');
      el.className = 'bg-item';
      el.textContent = items[Math.floor(Math.random() * items.length)];
      el.style.left = Math.random() * 100 + '%';
      el.style.top = Math.random() * 100 + '%';
      el.style.fontSize = (18 + Math.random() * 20) + 'px';
      el.style.animationDelay = (Math.random() * 5) + 's';
      el.style.animationDuration = (3 + Math.random() * 4) + 's';
      el.style.opacity = 0.5 + Math.random() * 0.5;
      container.appendChild(el);
    }
  }
  spawnBgDecor();

  // アンケート画面のキラキラ背景（控えめ）
  function spawnQuizSparkles() {
    const container = document.getElementById('quizSparkles');
    const items = ['✨', '⭐', '💫'];
    for (let i = 0; i < 10; i++) {
      const el = document.createElement('div');
      el.className = 'sparkle-bg';
      el.textContent = items[Math.floor(Math.random() * items.length)];
      el.style.left = Math.random() * 100 + '%';
      el.style.top = Math.random() * 100 + '%';
      el.style.fontSize = (10 + Math.random() * 10) + 'px';
      el.style.animationDelay = (Math.random() * 3) + 's';
      el.style.animationDuration = (3 + Math.random() * 2) + 's';
      container.appendChild(el);
    }
  }
  spawnQuizSparkles();

  const questions = [
    { type: 'emoji', q: '今日、満足した？',
      options: [
        { icon: '😍', label: '最高' },
        { icon: '😄', label: 'いい' },
        { icon: '😐', label: '普通' },
        { icon: '😣', label: 'うーん' }
      ] },
    { type: 'text', q: '何回目の来店？',
      options: ['初めて', '2〜3回目', '常連', '久しぶり'] },
    { type: 'emoji', q: 'スタッフの対応は？',
      options: [
        { icon: '🤩', label: '最高' },
        { icon: '😊', label: '良い' },
        { icon: '🙂', label: '普通' },
        { icon: '😑', label: '微妙' }
      ] },
    { type: 'slider', q: '満足度を点数で！', min: 0, max: 100, default: 85 },
    { type: 'tag', q: '気に入ったのは？（複数OK）',
      options: ['味', 'スピード', '接客', '価格', '雰囲気', 'ボリューム'] },
    { type: 'text', q: 'また来たい？',
      options: ['絶対来る', 'たぶん来る', '考える', '来ない'] },
    { type: 'emoji', q: '友達にすすめたい？',
      options: [
        { icon: '📣', label: 'めっちゃ' },
        { icon: '👍', label: 'する' },
        { icon: '🤔', label: '悩む' },
        { icon: '🙅', label: 'しない' }
      ] },
    { type: 'text', q: '次の来店予定は？',
      options: ['今週中', '今月中', '来月以降', '未定'] }
  ];

  const praises = [
    { emoji: '👏', text: 'ナイス！' },
    { emoji: '💯', text: '正直でえらい！' },
    { emoji: '🌟', text: 'ありがとう！' },
    { emoji: '💪', text: 'いいね〜！' },
    { emoji: '🎉', text: '最高！' },
    { emoji: '✨', text: 'さすが！' },
    { emoji: '😍', text: 'うれしい！' },
    { emoji: '🏆', text: '完ぺき！' }
  ];

  const gaugeMsgs = [
    'タップで応援パワーを溜めよう！',
    'いい調子！その調子！',
    'ゲージ順調に上昇中〜🔥',
    'もうすぐ半分！頑張って！',
    'ゲージ半分突破！🎊',
    'ラストスパート！',
    'あと少しで満タン！',
    'もう一息！ファイト！',
    '🎉 応援ゲージMAX達成！'
  ];

  let currentIndex = 0;
  let answers = [];
  let startTime = 0;
  let timerInterval = null;

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function startQuiz() {
    currentIndex = 0;
    answers = [];
    startTime = Date.now();
    updateGauge();
    showScreen('quiz');
    startTimer();
    renderQuestion();
  }

  function startTimer() {
    const timerEl = document.getElementById('timer');
    timerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      timerEl.textContent = `⏱ ${elapsed}秒`;
    }, 500);
  }

  function updateGauge() {
    const percent = Math.round((currentIndex / questions.length) * 100);
    document.getElementById('gaugeFill').style.width = percent + '%';
    document.getElementById('gaugePercent').textContent = percent + '%';
    const msgIdx = Math.min(Math.floor(currentIndex), gaugeMsgs.length - 1);
    document.getElementById('gaugeMsg').textContent = gaugeMsgs[msgIdx];
  }

  function renderQuestion() {
    const q = questions[currentIndex];
    document.getElementById('progressText').textContent = `${currentIndex + 1} / ${questions.length}`;
    document.getElementById('question').textContent = q.q;

    const opts = document.getElementById('options');
    opts.innerHTML = '';

    if (q.type === 'emoji') {
      const grid = document.createElement('div');
      grid.className = 'emoji-grid';
      q.options.forEach((opt) => {
        const col = document.createElement('div');
        col.className = 'emoji-col';
        const btn = document.createElement('button');
        btn.className = 'emoji-btn';
        btn.textContent = opt.icon;
        btn.onclick = (e) => selectAnswer(opt.icon + ' ' + opt.label, e, btn);
        const lbl = document.createElement('div');
        lbl.className = 'emoji-label';
        lbl.textContent = opt.label;
        col.appendChild(btn);
        col.appendChild(lbl);
        grid.appendChild(col);
      });
      opts.appendChild(grid);
    } else if (q.type === 'text') {
      q.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.onclick = (e) => selectAnswer(opt, e, btn);
        opts.appendChild(btn);
      });
    } else if (q.type === 'slider') {
      const wrap = document.createElement('div');
      wrap.className = 'slider-wrap';
      wrap.innerHTML = `
        <div class="slider-value" id="sliderVal">${q.default}</div>
        <input type="range" class="slider" id="slider" min="${q.min}" max="${q.max}" value="${q.default}">
        <div class="slider-labels"><span>${q.min}点</span><span>${q.max}点</span></div>
        <button class="slider-submit" id="sliderSubmit">決定 →</button>
      `;
      opts.appendChild(wrap);
      const slider = document.getElementById('slider');
      const val = document.getElementById('sliderVal');
      slider.oninput = () => val.textContent = slider.value;
      const sub = document.getElementById('sliderSubmit');
      sub.onclick = (e) => selectAnswer(`${slider.value}点`, e, sub);
    } else if (q.type === 'tag') {
      const grid = document.createElement('div');
      grid.className = 'tag-grid';
      const selected = new Set();
      q.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'tag-btn';
        btn.textContent = opt;
        btn.onclick = () => {
          if (selected.has(opt)) {
            selected.delete(opt);
            btn.classList.remove('selected');
          } else {
            selected.add(opt);
            btn.classList.add('selected');
          }
        };
        grid.appendChild(btn);
      });
      const submit = document.createElement('button');
      submit.className = 'tag-submit';
      submit.textContent = '決定 →';
      submit.onclick = (e) => selectAnswer(Array.from(selected).join(', ') || 'なし', e, submit);
      opts.appendChild(grid);
      opts.appendChild(submit);
    }
  }

  function selectAnswer(answer, event, btnEl) {
    answers.push({ q: questions[currentIndex].q, a: answer });

    const rect = btnEl ? btnEl.getBoundingClientRect() : null;
    const startX = rect ? rect.left + rect.width / 2 : (event.clientX || window.innerWidth / 2);
    const startY = rect ? rect.top + rect.height / 2 : (event.clientY || window.innerHeight / 2);

    const gauge = document.getElementById('gaugeFill');
    const gRect = gauge.getBoundingClientRect();
    const endX = gRect.left + gRect.width * ((currentIndex + 1) / questions.length) - 8;
    const endY = gRect.top + gRect.height / 2;

    flyStars(startX, startY, endX, endY);

    setTimeout(() => {
      currentIndex++;
      updateGauge();

      const gaugeWrap = document.getElementById('gaugeWrap');
      gaugeWrap.classList.remove('charged', 'max');
      void gaugeWrap.offsetWidth;
      if (currentIndex >= questions.length) {
        gaugeWrap.classList.add('max');
      } else {
        gaugeWrap.classList.add('charged');
      }

      showPraise(currentIndex - 1);

      setTimeout(() => {
        if (currentIndex >= questions.length) {
          finishQuiz();
        } else {
          renderQuestion();
        }
      }, 900);
    }, 500);
  }

  function flyStars(sx, sy, ex, ey) {
    const icons = ['⭐', '✨', '💫', '❤️', '🌟'];
    for (let i = 0; i < 6; i++) {
      const s = document.createElement('div');
      s.className = 'flying-star';
      s.textContent = icons[i % icons.length];
      s.style.left = sx + 'px';
      s.style.top = sy + 'px';
      document.body.appendChild(s);

      const offsetX = (Math.random() - 0.5) * 80;

      setTimeout(() => {
        s.style.left = ex + offsetX + 'px';
        s.style.top = ey + 'px';
        s.style.transform = 'scale(0.3)';
        s.style.opacity = '0.5';
      }, 50 + i * 50);

      setTimeout(() => s.remove(), 1000);
    }
  }

  function showPraise(idx) {
    const p = praises[Math.min(idx, praises.length - 1)];
    const el = document.getElementById('praise');
    document.getElementById('praiseEmoji').textContent = p.emoji;
    document.getElementById('praiseText').textContent = p.text;
    el.classList.remove('show');
    void el.offsetWidth;
    el.classList.add('show');
  }

  function skipQuestion() {
    answers.push({ q: questions[currentIndex].q, a: '(skip)' });
    currentIndex++;
    updateGauge();
    if (currentIndex >= questions.length) {
      finishQuiz();
    } else {
      renderQuestion();
    }
  }

  function goBack() {
    const activeId = document.querySelector('.screen.active')?.id;

    if (activeId === 'opening') {
      return;
    }

    if (activeId === 'complete') {
      currentIndex = Math.max(questions.length - 1, 0);
      answers = answers.slice(0, -1);
      updateGauge();
      renderQuestion();
      showScreen('quiz');
      return;
    }

    if (currentIndex <= 0) {
      clearInterval(timerInterval);
      showScreen('opening');
      return;
    }

    answers = answers.slice(0, -1);
    currentIndex--;
    updateGauge();
    renderQuestion();
  }

  function finishQuiz() {
    clearInterval(timerInterval);
    const num = String(Math.floor(Math.random() * 99999)).padStart(5, '0');
    document.getElementById('ticketNum').textContent = `#${num}`;
    const d = new Date();
    d.setDate(d.getDate() + 3);
    const days = ['日', '月', '火', '水', '木', '金', '土'];
    document.getElementById('drawDate').textContent =
      `${d.getMonth() + 1}/${d.getDate()}(${days[d.getDay()]}) 19:00`;
    setTimeout(() => {
      showScreen('complete');
      launchConfetti();
      console.log('回答結果:', createAnswerPayload(num));
    }, 600);
  }

  function launchConfetti() {
    const icons = ['🎉', '🎊', '⭐', '✨', '💝', '❤️', '🪙'];
    const complete = document.getElementById('complete');

    // 通常の紙吹雪
    for (let i = 0; i < 30; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.textContent = icons[Math.floor(Math.random() * icons.length)];
        c.style.left = Math.random() * 100 + '%';
        c.style.animationDuration = (2 + Math.random() * 2) + 's';
        c.style.animationDelay = Math.random() * 0.5 + 's';
        c.style.fontSize = (16 + Math.random() * 14) + 'px';
        complete.appendChild(c);
        setTimeout(() => c.remove(), 4000);
      }, i * 70);
    }

    // 降り注ぐ豪華抽選券
    for (let i = 0; i < 8; i++) {
      setTimeout(() => {
        const t = document.createElement('img');
        t.src = 'ticket_logo.png';
        t.className = 'falling-ticket';
        t.style.left = Math.random() * 90 + '%';
        t.style.width = (40 + Math.random() * 40) + 'px';
        t.style.animationDuration = (3 + Math.random() * 2) + 's';
        t.style.animationDelay = Math.random() * 0.8 + 's';
        complete.appendChild(t);
        setTimeout(() => t.remove(), 6000);
      }, 300 + i * 150);
    }
  }

  function closeApp() {
    if (window.liff && liffState.inClient) {
      liff.closeWindow();
      return;
    }

    alert('本番ではLIFFを閉じてLINEに戻ります\n\n【回答結果】\n' +
      answers.map(a => `${a.q} → ${a.a}`).join('\n'));
  }

  initLiff();
</script>
</body>
</html>
