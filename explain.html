<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>サービスについて - ゲキッチャ</title>
<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html {
    background: #fff3df;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Hiragino Maru Gothic ProN", "ヒラギノ丸ゴ ProN",
                 -apple-system, BlinkMacSystemFont, sans-serif;
    background:
      radial-gradient(circle at 50% 0%, rgba(255, 213, 77, 0.55), transparent 34%),
      linear-gradient(180deg, #fff8eb 0%, #ffd7a8 48%, #ff5a33 100%);
    color: #3a1e10;
    padding:
      calc(14px + env(safe-area-inset-top))
      clamp(10px, 3vw, 24px)
      calc(24px + env(safe-area-inset-bottom));
  }

  .top {
    width: min(100%, 980px);
    margin: 0 auto 12px;
    display: flex;
    justify-content: flex-start;
    align-items: center;
  }

  .back {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 44px;
    padding: 10px 18px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.94);
    color: #ff5722;
    text-decoration: none;
    font-size: 15px;
    font-weight: 900;
    box-shadow:
      0 2px 0 rgba(210, 110, 40, 0.28),
      0 8px 20px rgba(80, 35, 10, 0.18);
    white-space: nowrap;
  }

  .flyer-wrap {
    width: min(100%, 980px);
    margin: 0 auto;
    border-radius: 18px;
    overflow: hidden;
    background: #fff;
    box-shadow:
      0 18px 42px rgba(95, 30, 12, 0.24),
      0 2px 0 rgba(255, 255, 255, 0.9) inset;
  }

  .flyer {
    width: 100%;
    height: auto;
    display: block;
  }
</style>
</head>
<body>
  <div class="top">
    <a class="back" href="index.html">← 戻る</a>
  </div>

  <main class="flyer-wrap" aria-label="ゲキッチャ サービス概要チラシ">
    <img
      class="flyer"
      src="docs/flyers/gekiccha_corporate_flyer_image2_revised_text.png"
      alt="ゲキッチャのサービス概要チラシ"
    >
  </main>
</body>
</html>
